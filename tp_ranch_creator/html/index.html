<html>

<head>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

	<link href="css/style.css" rel="stylesheet" type="text/css" />
	<script src="nui://game/ui/jquery.js" type="text/javascript"></script>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
	<meta charset="utf-8" />
</head>

<body>
	<script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.12.1/jquery-ui.min.js"></script>
	<script src="js/script_config_data.js" type="text/javascript"></script>
	<script src="js/script_utils.js" type="text/javascript"></script>
	<script src="js/script.js" type="text/javascript"></script>

	<div id="main">

		<div id="main-title"></div>
		<div id="main-title-description"></div>

		<div id="main-buttons-list"></div>

		<div id="main-exit-button"></div>

		<div id="main-back-button"></div>
		<div id="main-config-data-button"></div>
		<div id="main-all-config-data-button"></div>

		<div class="main-cost"> <!-- @Cost - for buying the ranch -->

			<div id="main-cost-description"></div>
			<input id="main-cost-input" placeholder="Insert a cost amount"></input>

			<!-- @IsItem - add options false or true -->
			<div id="main-cost-method-description"></div>
			<input id="main-cost-method-input" placeholder="Insert a currency type or item name."></input>

			<div id="main-cost-item-method-description"></div>

			<label id="main-cost-item-method-item-label">
				<input type="radio" id="item_radio" name="payment-item-method" value='0' checked>
				Yes Item
			</label>

			<label id="main-cost-item-method-not-item-label">
				<input type="radio" id="not_item_radio" name="payment-item-method" value='1'>
				No Item
			</label>

		</div>

		<div class="main-required-jobs"> <!-- @AddMemberRequiredJobs - for adding members -->

			<div id="main-required-jobs-description"></div>

			<!-- @AddMemberRequiredJobs - add option false or true or jobs-->
			<input id="main-required-jobs-input" placeholder="Insert jobs or keep it false" value="false"></input>
		</div>

		<div class="main-coords"> <!-- @Coords - for opening the ranch menu -->

			<div id="main-coords-description"></div>

			<input id="main-coords-position-input" placeholder="Vector3 is required" value="vector3(0, 0, 0)"
				readonly></input>
			<div id="main-coords-position-button"></div>

		</div>

		<div class="animal-store"> <!-- @AnimalStore - for buying from the ranch menu -->
			<div id="animal-store-description"></div>

			<div id="animal-store-chicken-description"></div>
			<label class="animal-store-chicken-switch">
				<input type="checkbox" id="animal-store-chicken-switch">
				<span class="slider"></span>
			</label>

			<div id="animal-store-sheep-description"></div>
			<label class="animal-store-sheep-switch">
				<input type="checkbox" id="animal-store-sheep-switch">
				<span class="slider"></span>
			</label>

			<div id="animal-store-cow-description"></div>
			<label class="animal-store-cow-switch">
				<input type="checkbox" id="animal-store-cow-switch">
				<span class="slider"></span>
			</label>

			<div id="animal-store-goat-description"></div>
			<label class="animal-store-goat-switch">
				<input type="checkbox" id="animal-store-goat-switch">
				<span class="slider"></span>
			</label>

			<div id="animal-store-pig-description"></div>
			<label class="animal-store-pig-switch">
				<input type="checkbox" id="animal-store-pig-switch">
				<span class="slider"></span>
			</label>

		</div>

		<div class="milk-container"> <!-- @MilkContainerCoords - for accessing the milk container jug -->

			<div id="milk-container-access-description"></div>

			<input id="milk-container-position-input" placeholder="Table coords are required"
				value="{ x = 0, y = 0, z = 0, pitch = 0, roll = 0, yaw = 0, render_distance = 20.0 }" readonly></input>

			<div id="milk-container-position-button"></div>

			<div id="milk-container-deliver-description"></div>

			<input id="milk-container-deliver-input" placeholder="Table coords are required"
				value="{ x = 0, y = 0, z = 0, action_distance = 0.9 }" readonly></input>

			<div id="milk-container-deliver-button"></div>

		</div>

		<div class="water-barrel"> <!-- @WaterBarrelCoords - for accessing the water barrel -->

			<div id="water-barrel-description"></div>

			<input id="water-barrel-position-input" placeholder="Table coords are required"
				value="{ x = 0, y = 0, z = 0, pitch = 0, roll = 0, yaw = 0, render_distance = 20.0 }" readonly></input>

			<div id="water-barrel-position-button"></div>

		</div>

		<div class="hay-barrel"> <!-- @WaterBarrelCoords - for accessing the water barrel -->

			<div id="hay-barrel-description"></div>

			<input id="hay-barrel-position-input" placeholder="Table coords are required" readonly></input>

			<div id="hay-barrel-position-button"></div>

			<div id="hay-barrel-icon-description"></div>

			<label id="hay-barrel-display-icon-label">
				<input type="radio" id="hay_display_icon_radio" name="hay-diplay-item-method" value='1' checked>
				Yes Icon
			</label>

			<label id="hay-barrel-display-not-icon-label">
				<input type="radio" id="hay_not_display_icon_radio" name="hay-diplay-item-method" value='0'>
				No Icon
			</label>

		</div>

		<div class="pitch-fork"> <!-- @PitchForkObjectCoords - for pitchfork spawn -->

			<div id="pitch-fork-description"></div>

			<input id="pitch-fork-position-input" placeholder="Table coords are required" readonly></input>

			<div id="pitch-fork-position-button"></div>

		</div>

		<div class="cauldron"> <!-- @CauldronObject - for cauldron fertilizer -->

			<div id="cauldron-description"></div>
			<input id="cauldron-position-input" placeholder="Table coords are required" readonly></input>
			<div id="cauldron-position-button"></div>

			<div id="cauldron-teleport-description"></div>
			<input id="cauldron-teleport-input" placeholder="Table coords are required" readonly></input>
			<div id="cauldron-teleport-button"></div>

		</div>

		<div class="animals"> <!-- @CauldronObject - for cauldron fertilizer -->

			<div id="animals-buttons-list"></div>

		</div>

		<div class="animals-cow">
			<div id="animals-cow-amount-description"></div>
			<input id="animals-cow-amount-input" placeholder="Amount of cows is required" value="0"
				onkeypress="return onNumbers(event)"></input>

			<div id="animals-cow-buttons-list"></div>

			<div id="animals-cow-back-button"></div>
		</div>

		<div class="animals-goat">
			<div id="animals-goat-amount-description"></div>
			<input id="animals-goat-amount-input" placeholder="Amount of goats is required" value="0"
				onkeypress="return onNumbers(event)"></input>

			<div id="animals-goat-buttons-list"></div>

			<div id="animals-goat-back-button"></div>
		</div>


		<div class="animals-sheep">
			<div id="animals-sheep-amount-description"></div>
			<input id="animals-sheep-amount-input" placeholder="Amount of sheep is required" value="0"
				onkeypress="return onNumbers(event)"></input>

			<div id="animals-sheep-buttons-list"></div>

			<div id="animals-sheep-back-button"></div>
		</div>


		<div class="animals-chicken">
			<div id="animals-chicken-amount-description"></div>
			<input id="animals-chicken-amount-input" placeholder="Amount of chickens is required" value="0"
				onkeypress="return onNumbers(event)"></input>

			<div id="animals-chicken-buttons-list"></div>

			<div id="animals-chicken-back-button"></div>
		</div>


		<div class="animals-pig">

			<div id="animals-pig-amount-description"></div>
			<input id="animals-pig-amount-input" placeholder="Amount of pigs is required" value="0"
				onkeypress="return onNumbers(event)"></input>

			<div id="animals-pig-buttons-list"></div>

			<div id="animals-pig-back-button"></div>
		</div>

		<div class="animals-actions">
			<div id="animals-actions-description"></div>
			<div id="animals-actions-list"></div>

			<div id="animals-actions-back-button"></div>
			<div id="animals-actions-create-button"></div>
		</div>

		<div class="herding">
			<div id="herding-description"></div>
			<div id="herding-buttons-list"></div>

		</div>

		<div class="herding-spawn-points">
			<div id="herding-spawn-points-description"></div>
			<div id="herding-spawn-points-list"></div>
			<div id="herding-spawn-points-back-button"></div>
		</div>

		<div class="herding-herding-points">
			<div id="herding-herding-description"></div>
			<div id="herding-herding-list"></div>

			<div id="herding-herding-back-button"></div>
			<div id="herding-herding-create-button"></div>
		</div>

		<div class="herding-wolf-attacks">
			<div id="herding-wolf-attacks-description"></div>

			<label id="herding-wolf-attacks-enable-label">
				<input type="radio" id="wolf_attacks_enabled_radio" name="herding-wolf-attacks-item-method" value='0'
					checked>
				Enabled
			</label>

			<label id="herding-wolf-attacks-disable-label">
				Disabled
				<input type="radio" id="wolf_attacks_disabled_radio" name="herding-wolf-attacks-item-method" value='1'>
			</label>

			<div id="herding-wolf-attacks-chance-description"></div>

			<input id="herding-wolf-attacks-chance-input" placeholder="Chance value required" value="30"
				onkeypress="return onNumbers(event)"></input>

			<div id="herding-wolf-attacks-list"></div>
			<div id="herding-wolf-attacks-create-button"></div>
			<div id="herding-wolf-attacks-back-button"></div>
		</div>


		<div class="exit-dialog">
			<div id="exit-dialog-background1"> </div>
			<div id="exit-dialog-background2"> </div>

			<div id="exit-dialog-description"></div>
			<div id="exit-dialog-accept-button"></div>
			<div id="exit-dialog-cancel-button"></div>
		</div>

		<div class="tooltip"></div>


	</div>

	<div class="config-data-dialog">
		<div id="config-data-background1"> </div>
		<div id="config-data-background2"> </div>
		<div id="config-data-background3"> </div>

		<div id="config-data-message"></div>
		<i id="config-data-copy-button" class="fa-solid fa-copy"></i>
		<i id="config-data-close-button" class="fa-solid fa-x"></i>

	</div>

	<span class="lua-comment"></span>
	<span class="lua-string"></span>
	<span class="lua-number"></span>
	<span class="lua-bracket"></span>
	<span class="lua-bool"></span>
	<span class="lua-equals"></span>

	<div class="placement-info">
		<div id="controls">
			<div id="basic-controls" class="control-set">

				<div class="control-and-help">
					<div class="control">q</div>
					<div class="control-help">Height Z+</div>
				</div>

				<div class="control-and-help">
					<div class="control">r</div>
					<div class="control-help">Height Z-</div>
				</div>

				<div class="control-and-help">
					<div class="control">s</div>
					<div class="control-help">Rotate</div>
				</div>

				<div class="control-and-help">
					<div class="control">t</div>
					<div class="control-help">Rotate</div>
				</div>

				<div class="control-and-help">
					<div class="control">R</div>
					<div class="control-help">Reset Placement</div>
				</div>

				<div class="control-and-help">
					<div class="control">v</div>
					<div class="control-help">Pitch Rotatation</div>
				</div>

				<div class="control-and-help">
					<div class="control">u</div>
					<div class="control-help">Pitch Rotatation</div>
				</div>

				<div class="control-and-help">
					<div class="control">]</div>
					<div class="control-help">Roll Rotatation</div>
				</div>

				<div class="control-and-help">
					<div class="control">[</div>
					<div class="control-help">Roll Rotatation</div>
				</div>

				<div class="control-and-help">
					<div class="control">a</div>
					<div class="control-help">Place Object</div>
				</div>

				<div class="control-and-help">
					<div class="control">k</div>
					<div class="control-help">Cancel Object Placement</div>
				</div>

			</div>
		</div>

	</div>
</body>

</html>
